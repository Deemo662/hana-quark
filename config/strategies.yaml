# ============================================================
# 策略定义 v2 — 基于2026年市场调研升级
# ============================================================
# 核心变化：去市值+加股息+紧股票池+强化排雷
# ============================================================

strategies:

  # ========== v2 新策略（主推） ==========

  quality_lowvol:
    name: "质量低波（ROE+毛利率+波动率+PB+现金流排雷）"
    note: "去市值、重质量——注册制后更稳健的选择"
    factors:
      - quality_roe
      - quality_gross_margin
      - momentum_volatility_6m
      - value_pb
      - safety_ocf_to_profit
    weights: equal
    top_n: 25
    rebalance: monthly
    sort_orders:
      quality_roe: desc
      quality_gross_margin: desc
      momentum_volatility_6m: asc
      value_pb: asc
      safety_ocf_to_profit: desc

  dividend_lowvol:
    name: "红利低波（股息率+波动率）"
    note: "2023-2025最强策略，确定性溢价时代"
    factors:
      - dividend_yield
      - momentum_volatility_6m
    weights: equal
    top_n: 30
    rebalance: quarterly
    sort_orders:
      dividend_yield: desc
      momentum_volatility_6m: asc

  quality_dividend:
    name: "质量红利（ROE+股息率+低波）"
    note: "能赚钱+愿分红+波动小，排除价值陷阱"
    factors:
      - quality_roe
      - dividend_yield
      - momentum_volatility_6m
    weights: equal
    top_n: 25
    rebalance: monthly
    sort_orders:
      quality_roe: desc
      dividend_yield: desc
      momentum_volatility_6m: asc

  # ========== v1升级版（去市值因子） ==========

  best_five_factor:
    name: "五因子v2（毛利率+ROIC+波动率+PS+OCF排雷）"
    book_cagr_20: 18.44
    note: "原TOP1去市值，OCF排雷替代"
    factors:
      - quality_gross_margin
      - quality_roic
      - momentum_volatility_6m
      - value_ps_ttm
      - safety_ocf_to_profit
    weights: equal
    top_n: 20
    rebalance: monthly
    sort_orders:
      quality_gross_margin: desc
      quality_roic: desc
      momentum_volatility_6m: asc
      value_ps_ttm: asc
      safety_ocf_to_profit: desc

  roe_lowvol:
    name: "ROE+6月波动率（原TOP3）"
    book_cagr_20: 16.90
    note: "双因子，不依赖市值，质量因子注册制后增强"
    factors:
      - quality_roe
      - momentum_volatility_6m
    weights: equal
    top_n: 20
    rebalance: monthly
    sort_orders:
      quality_roe: desc
      momentum_volatility_6m: asc

  pb_lowvol:
    name: "PB+6月波动率（保守型）"
    book_cagr_20: 15.14
    note: "低估值+低波动，熊市防御"
    factors:
      - value_pb
      - momentum_volatility_6m
    weights: equal
    top_n: 20
    rebalance: monthly
    sort_orders:
      value_pb: asc
      momentum_volatility_6m: asc

  five_factor_v2:
    name: "EV/Sales+ROE+权益/带息债务+波动率+动量"
    book_cagr_20: 17.26
    factors:
      - value_ev2sales
      - quality_roe
      - safety_equity2debt
      - momentum_volatility_6m
      - momentum_3m
    weights: equal
    top_n: 20
    rebalance: monthly
    sort_orders:
      value_ev2sales: asc
      quality_roe: desc
      safety_equity2debt: desc
      momentum_volatility_6m: asc
      momentum_3m: desc
