# 短线策略定义（v2-short-term）
strategies:

  # 🔴 S级：华安证券首板回调策略
  first_board_callback:
    name: "首板回调策略"
    source: "华安证券 2026.03 《涨停板背后的Alpha》"
    source_cagr: 18.21
    source_sharpe: 1.09
    source_maxdd: -9.69
    factors:
      - hot_first_board        # 昨日首板涨停
      - hot_callback_ratio     # 回调幅度（越小越好）
      - hot_circ_mv_small      # 小盘偏好
    weights: equal
    top_n: 10
    rebalance: daily           # 日频调仓
    sort_orders:
      hot_first_board: desc
      hot_callback_ratio: asc
      hot_circ_mv_small: asc
    holding_days: 1            # 91%交易持1天

  # 🟠 A级：量能突破策略
  volume_breakout:
    name: "量能突破策略"
    source: "MDPI 2025 学术论文 + 业界实证"
    source_cagr: null
    factors:
      - hot_volume_ratio       # 量比>2.0
      - hot_momentum_5d        # 短线动量
      - hot_circ_mv_small      # 小盘
    weights:
      hot_volume_ratio: 0.4
      hot_momentum_5d: 0.3
      hot_circ_mv_small: 0.3
    top_n: 10
    rebalance: daily
    sort_orders:
      hot_volume_ratio: desc
      hot_momentum_5d: desc
      hot_circ_mv_small: asc
    holding_days: 1

  # 🟠 A级：短线动量策略
  short_momentum:
    name: "短线动量策略"
    source: "Zeng & Liu 学术论文（A股短期动量显著）"
    source_cagr: null
    factors:
      - hot_momentum_5d
      - hot_turnover_accel     # 换手加速确认
      - hot_circ_mv_small
    weights: equal
    top_n: 10
    rebalance: daily
    sort_orders:
      hot_momentum_5d: desc
      hot_turnover_accel: desc
      hot_circ_mv_small: asc
    holding_days: 3

  # 🟡 B级：烂板反转策略
  broken_board_reversal:
    name: "烂板反转策略"
    source: "腾讯新闻 2025 110,805次涨停统计"
    source_cagr: null
    factors:
      - hot_broken_board       # 昨日烂板信号
      - hot_callback_ratio     # 次日低开幅度
      - hot_circ_mv_small
    weights: equal
    top_n: 10
    rebalance: daily
    sort_orders:
      hot_broken_board: desc
      hot_callback_ratio: asc
      hot_circ_mv_small: asc
    holding_days: 2

  # 🟡 B级：龙虎榜主力跟随
  lhb_follow:
    name: "龙虎榜跟随策略"
    source: "东方财富龙虎榜数据"
    source_cagr: null
    factors:
      - hot_inst_net_buy       # 机构净买入
      - hot_volume_ratio       # 放量确认
      - hot_circ_mv_small
    weights:
      hot_inst_net_buy: 0.5
      hot_volume_ratio: 0.3
      hot_circ_mv_small: 0.2
    top_n: 10
    rebalance: daily
    sort_orders:
      hot_inst_net_buy: desc
      hot_volume_ratio: desc
      hot_circ_mv_small: asc
    holding_days: 3
